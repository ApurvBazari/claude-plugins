<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Observability Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #09090b;
    color: #fafafa;
    padding: 24px;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 600;
    color: #fafafa;
    margin-bottom: 8px;
  }
  .header .subtitle {
    font-size: 14px;
    color: #71717a;
  }
  .summary {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .stat {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 16px 24px;
    text-align: center;
    min-width: 140px;
  }
  .stat .value {
    font-size: 28px;
    font-weight: 700;
    color: #fafafa;
  }
  .stat .label {
    font-size: 12px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr; }
  }
  .card {
    background: #18181b;
    border: 1px solid #27272a;
    border-radius: 8px;
    padding: 20px;
  }
  .card h2 {
    font-size: 14px;
    font-weight: 600;
    color: #a1a1aa;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .card canvas {
    max-height: 280px;
  }
  table.skill-table {
    width: 100%;
    border-collapse: collapse;
  }
  table.skill-table th,
  table.skill-table td {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid #27272a;
    font-size: 13px;
  }
  table.skill-table th {
    color: #71717a;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  table.skill-table td { color: #d4d4d8; }
  table.skill-table td.count {
    font-variant-numeric: tabular-nums;
    text-align: right;
    color: #3b82f6;
    font-weight: 600;
  }
  .empty { color: #52525b; font-style: italic; padding: 20px; text-align: center; }
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: #3f3f46;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Claude Code Observability</h1>
  <div class="subtitle" id="subtitle"></div>
</div>

<div class="summary" id="summary"></div>

<div class="grid">
  <div class="card">
    <h2>Sessions Over Time</h2>
    <canvas id="sessionsChart"></canvas>
  </div>
  <div class="card">
    <h2>Tool Usage Distribution</h2>
    <canvas id="toolsChart"></canvas>
  </div>
  <div class="card">
    <h2>Error Rate Trend</h2>
    <canvas id="errorChart"></canvas>
  </div>
  <div class="card">
    <h2>Compactions Per Session</h2>
    <canvas id="compactionsChart"></canvas>
  </div>
  <div class="card">
    <h2>Project Comparison</h2>
    <canvas id="projectChart"></canvas>
  </div>
  <div class="card">
    <h2>Skill Usage</h2>
    <div id="skillTable"></div>
  </div>
  <div class="card">
    <h2>Quality Signals</h2>
    <canvas id="qualityChart"></canvas>
  </div>
  <div class="card">
    <h2>Activity by Hour</h2>
    <canvas id="heatmapChart"></canvas>
  </div>
  <div class="card" style="grid-column: span 2;">
    <h2>Week over Week</h2>
    <canvas id="wowChart"></canvas>
  </div>
</div>

<div class="footer" id="footer"></div>

<script>
// Dashboard data is embedded at generation time by generate_dashboard.py.
// The generator replaces the placeholder below with a JSON object.
// All data is locally generated from the user's own NDJSON event files
// — no external data sources are involved.
const DATA = /*__EMBEDDED_DATA__*/null;

const COLORS = {
  blue: '#3b82f6',
  blueBg: 'rgba(59, 130, 246, 0.6)',
  green: '#22c55e',
  greenBg: 'rgba(34, 197, 94, 0.6)',
  red: '#ef4444',
  redBg: 'rgba(239, 68, 68, 0.3)',
  orange: '#f97316',
  orangeBg: 'rgba(249, 115, 22, 0.6)',
  grid: '#27272a',
  text: '#71717a',
};

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
  },
  scales: {
    x: {
      ticks: { color: COLORS.text, maxRotation: 45 },
      grid: { color: COLORS.grid },
    },
    y: {
      ticks: { color: COLORS.text },
      grid: { color: COLORS.grid },
      beginAtZero: true,
    },
  },
};

// Safely escape text for display (prevents injection from data values)
function esc(str) {
  const el = document.createElement('span');
  el.textContent = String(str);
  return el.textContent;
}

function init() {
  if (!DATA) {
    document.body.textContent = 'No data available. Generate a dashboard with observability data first.';
    return;
  }

  // Subtitle
  document.getElementById('subtitle').textContent =
    'Range: ' + DATA.range + ' | Generated: ' + new Date(DATA.generated_at).toLocaleString();

  // Summary stats
  const s = DATA.summary;
  const summaryEl = document.getElementById('summary');
  const stats = [
    { value: s.total_sessions, label: 'Sessions' },
    { value: s.total_events.toLocaleString(), label: 'Events' },
    { value: s.total_tools.toLocaleString(), label: 'Tool Uses' },
    { value: s.total_cost > 0 ? '$' + s.total_cost.toFixed(2) : 'N/A', label: 'Total Cost' },
  ];
  stats.forEach(function(st) {
    var div = document.createElement('div');
    div.className = 'stat';
    var valEl = document.createElement('div');
    valEl.className = 'value';
    valEl.textContent = st.value;
    var labEl = document.createElement('div');
    labEl.className = 'label';
    labEl.textContent = st.label;
    div.appendChild(valEl);
    div.appendChild(labEl);
    summaryEl.appendChild(div);
  });

  // Sessions chart
  var spd = DATA.sessions_per_day;
  if (spd.labels.length > 0) {
    new Chart(document.getElementById('sessionsChart'), {
      type: 'bar',
      data: {
        labels: spd.labels,
        datasets: [{ data: spd.values, backgroundColor: COLORS.blueBg, borderColor: COLORS.blue, borderWidth: 1 }],
      },
      options: CHART_DEFAULTS,
    });
  }

  // Tool distribution (horizontal bar)
  var td = DATA.tool_distribution;
  if (td.labels.length > 0) {
    new Chart(document.getElementById('toolsChart'), {
      type: 'bar',
      data: {
        labels: td.labels,
        datasets: [{ data: td.values, backgroundColor: COLORS.blueBg, borderColor: COLORS.blue, borderWidth: 1 }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid }, beginAtZero: true },
          y: { ticks: { color: COLORS.text, font: { size: 11 } }, grid: { display: false } },
        },
      },
    });
  }

  // Error rate trend
  var ert = DATA.error_rate_trend;
  if (ert.labels.length > 0) {
    new Chart(document.getElementById('errorChart'), {
      type: 'line',
      data: {
        labels: ert.labels,
        datasets: [{
          data: ert.values,
          borderColor: COLORS.red,
          backgroundColor: COLORS.redBg,
          fill: true,
          tension: 0.3,
          pointRadius: 3,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: COLORS.text, maxRotation: 45 }, grid: { color: COLORS.grid } },
          y: { ticks: { color: COLORS.text, callback: function(v) { return v + '%'; } }, grid: { color: COLORS.grid }, beginAtZero: true },
        },
      },
    });
  }

  // Compactions
  var cps = DATA.compactions_per_session;
  if (cps.labels.length > 0) {
    new Chart(document.getElementById('compactionsChart'), {
      type: 'bar',
      data: {
        labels: cps.labels,
        datasets: [{
          data: cps.values,
          backgroundColor: COLORS.orangeBg,
          borderColor: COLORS.orange,
          borderWidth: 1,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: COLORS.text, maxRotation: 45, font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { color: COLORS.text, stepSize: 1 }, grid: { color: COLORS.grid }, beginAtZero: true },
        },
      },
    });
  } else {
    document.getElementById('compactionsChart').style.display = 'none';
    var emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty';
    emptyDiv.textContent = 'No compactions recorded';
    document.getElementById('compactionsChart').parentElement.appendChild(emptyDiv);
  }

  // Project comparison (grouped bar)
  var pc = DATA.project_comparison;
  if (pc.labels.length > 0) {
    new Chart(document.getElementById('projectChart'), {
      type: 'bar',
      data: {
        labels: pc.labels,
        datasets: [
          { label: 'Sessions', data: pc.sessions, backgroundColor: COLORS.blueBg, borderColor: COLORS.blue, borderWidth: 1 },
          { label: 'Tools', data: pc.tools, backgroundColor: COLORS.greenBg, borderColor: COLORS.green, borderWidth: 1 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: COLORS.text } } },
        scales: {
          x: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid } },
          y: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid }, beginAtZero: true },
        },
      },
    });
  }

  // Skill usage table (built with safe DOM methods)
  var su = DATA.skill_usage;
  var tableContainer = document.getElementById('skillTable');
  if (su.length > 0) {
    var table = document.createElement('table');
    table.className = 'skill-table';
    var thead = document.createElement('thead');
    var headRow = document.createElement('tr');
    var th1 = document.createElement('th');
    th1.textContent = 'Skill';
    var th2 = document.createElement('th');
    th2.textContent = 'Count';
    th2.style.textAlign = 'right';
    headRow.appendChild(th1);
    headRow.appendChild(th2);
    thead.appendChild(headRow);
    table.appendChild(thead);
    var tbody = document.createElement('tbody');
    su.forEach(function(skill) {
      var row = document.createElement('tr');
      var td1 = document.createElement('td');
      td1.textContent = skill.skill;
      var td2 = document.createElement('td');
      td2.className = 'count';
      td2.textContent = skill.count;
      row.appendChild(td1);
      row.appendChild(td2);
      tbody.appendChild(row);
    });
    table.appendChild(tbody);
    tableContainer.appendChild(table);
  } else {
    var emptyMsg = document.createElement('div');
    emptyMsg.className = 'empty';
    emptyMsg.textContent = 'No skill invocations recorded';
    tableContainer.appendChild(emptyMsg);
  }

  // Quality signals (horizontal bar)
  var qs = DATA.quality_signals;
  if (qs && qs.total > 0) {
    new Chart(document.getElementById('qualityChart'), {
      type: 'bar',
      data: {
        labels: qs.labels,
        datasets: [{ data: qs.values, backgroundColor: COLORS.redBg, borderColor: COLORS.red, borderWidth: 1 }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: COLORS.text, stepSize: 1 }, grid: { color: COLORS.grid }, beginAtZero: true },
          y: { ticks: { color: COLORS.text }, grid: { display: false } },
        },
      },
    });
  } else {
    document.getElementById('qualityChart').style.display = 'none';
    var qEmpty = document.createElement('div');
    qEmpty.className = 'empty';
    qEmpty.textContent = 'No quality issues detected';
    document.getElementById('qualityChart').parentElement.appendChild(qEmpty);
  }

  // Activity heatmap (bar chart by hour)
  var hm = DATA.activity_heatmap;
  if (hm && hm.values.some(function(v) { return v > 0; })) {
    new Chart(document.getElementById('heatmapChart'), {
      type: 'bar',
      data: {
        labels: hm.labels,
        datasets: [{ data: hm.values, backgroundColor: COLORS.greenBg, borderColor: COLORS.green, borderWidth: 1 }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: COLORS.text, maxRotation: 45, font: { size: 10 } }, grid: { display: false } },
          y: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid }, beginAtZero: true },
        },
      },
    });
  }

  // Week-over-week comparison (grouped bar)
  var wow = DATA.week_over_week;
  if (wow) {
    new Chart(document.getElementById('wowChart'), {
      type: 'bar',
      data: {
        labels: wow.labels,
        datasets: [
          { label: 'This Week', data: wow.this_week, backgroundColor: COLORS.blueBg, borderColor: COLORS.blue, borderWidth: 1 },
          { label: 'Last Week', data: wow.last_week, backgroundColor: 'rgba(113, 113, 122, 0.4)', borderColor: '#71717a', borderWidth: 1 },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: true, labels: { color: COLORS.text } } },
        scales: {
          x: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid } },
          y: { ticks: { color: COLORS.text }, grid: { color: COLORS.grid }, beginAtZero: true },
        },
      },
    });
  }

  // Footer
  document.getElementById('footer').textContent =
    'Generated by observe plugin | ' + new Date(DATA.generated_at).toLocaleString();
}

init();
</script>
</body>
</html>
