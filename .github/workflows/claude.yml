name: Claude Code

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          max_turns: 12
          custom_instructions: |
            This is a Claude Code plugin marketplace repository (markdown + shell + JSON, no compiled code).
            It contains 4 plugins: onboard (codebase analyzer), forge (project scaffolder), observe (observability), notify (system notifications).

            Review this PR against the repo conventions in .claude/rules/:
            - plugin-structure.md: plugin directory requirements, self-contained plugins
            - skills-authoring.md: SKILL.md H1 naming, Guard pattern, step numbering, Key Rules section
            - agents-authoring.md: Tools section, read-only default, structured output
            - shell-scripts.md: set -euo pipefail for utilities, exit 0 for hooks, ShellCheck, POSIX compat
            - manifests.md: required fields, version sync between plugin.json and marketplace.json

            Also check:
            - Correctness and potential bugs in shell scripts
            - Security concerns (command injection in scripts, unsafe variable expansion)
            - Cross-plugin integration consistency (forge → onboard)
            - Missing edge cases or error handling

  claude-sonnet:
    if: >
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude') &&
      !contains(github.event.comment.body, '@claude-opus') &&
      !contains(github.event.comment.body, '@claude security-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-sonnet-4-6
          max_turns: 10
          trigger_phrase: "@claude"

  claude-opus:
    if: >
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude-opus')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          max_turns: 10
          trigger_phrase: "@claude-opus"
