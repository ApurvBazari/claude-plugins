name: Plugin Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck on all .sh files
        # Third-party action — SHA-pinned for supply-chain integrity (audit finding L2).
        # 00cae50 == tag v2.0.0; bump the SHA + comment together when upgrading.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: .
          severity: warning

  json-validation:
    name: Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifests
        run: .github/scripts/validate-manifests.sh

  structure-check:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin directory structure
        run: .github/scripts/check-structure.sh

  reference-check:
    name: Reference Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check reference file integrity
        run: .github/scripts/check-references.sh

  action-pinning:
    name: Action Pinning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify GitHub Actions are pinned to immutable refs
        run: .github/scripts/check-action-pinning.sh

  version-sync:
    name: Plugin Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify plugin.json versions match marketplace.json entries
        run: .github/scripts/check-version-sync.sh

  state-gitignore:
    name: State File Gitignore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify onboard state files are gitignored
        run: .github/scripts/check-state-gitignore.sh
