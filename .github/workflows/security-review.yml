name: Claude Security Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main, develop]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  auto-security-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          # max_turns intentionally high: security audit on multi-file PRs needs turns
          # for reading + analysis + posting findings. Lower values (20-30) caused the audit
          # to truncate silently without updating the progress comment. See PR #16 history.
          max_turns: 100
          track_progress: true
          direct_prompt: |
            Security audit for a Claude Code plugin repo (markdown + shell scripts + JSON manifests — no compiled code, no web frontend, no database).
            It contains 3 plugins: onboard (codebase analyzer), forge (project scaffolder), notify (system notifications).

            Focus on what matters for this codebase:

            1. **Shell injection** — unquoted variables, eval usage, unsafe interpolation in hook scripts (.sh files)
            2. **Command injection** — user-controlled input flowing into shell commands via stdin JSON parsing
            3. **Path traversal** — file operations using unsanitized paths from tool input
            4. **Credential exposure** — hardcoded secrets, tokens, or API keys in code or config
            5. **Unsafe file operations** — insecure permissions, symlink attacks, TOCTOU races in hook scripts
            6. **Supply-chain hardening** — beyond what the action-pinning linter already catches (that one fails PRs with `uses: owner/action@master` outright), look for workflows that fetch or interpolate external content: any `run:` step that interpolates attacker-controllable GitHub event inputs (issue/PR title or body, commit messages, head_ref, etc.) without `env:` quoting; any workflow that downloads scripts/binaries from a URL and executes them; any `pull_request_target` trigger that checks out the PR head. The deterministic pinning linter and the marketplace-version-sync linter handle the mechanical cases — your job is the subtler ones.
            7. **Prompt-injection in agent prompts** — SKILL.md files that build prompts for `Agent(...)` or `Skill(...)` invocations by interpolating user-controlled free-text (wizardAnswers.projectDescription, pain points, notes, anything captured from a wizard Q&A) without wrapping it in an explicit `<untrusted-user-input field="...">...</untrusted-user-input>` data fence. The pattern we've adopted (see `onboard/skills/init/references/onboard-context-builder.md` § Untrusted-input sanitiser and `onboard/skills/generate/SKILL.md` § validate) is: length-cap + strip `\r` + wrap in the XML fence + instruct the agent to treat fenced content as data, not instructions. Flag any new SKILL.md that forwards free-text into an agent prompt without this treatment.

            Skip categories irrelevant to this repo: SQL/NoSQL/LDAP injection, XXE, XSS, CSRF, deserialization, authentication, session management.

            **Progress tracking**: Update your progress comment by checking off each item as you complete it. After finishing all checks, post a final summary with findings listed as Critical / High / Medium / Low. If clean, confirm the changes pass review. Always post the final report — do not end without updating the comment.

  security-review:
    if: >
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      contains(github.event.comment.body, '@claude security-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: claude-opus-4-6
          max_turns: 20
          trigger_phrase: "@claude security-review"
          direct_prompt: |
            Security audit for a Claude Code plugin repo (markdown + shell scripts + JSON manifests — no compiled code, no web frontend, no database).
            It contains 3 plugins: onboard (codebase analyzer), forge (project scaffolder), notify (system notifications).

            Focus on what matters for this codebase:

            1. **Shell injection** — unquoted variables, eval usage, unsafe interpolation in hook scripts (.sh files)
            2. **Command injection** — user-controlled input flowing into shell commands via stdin JSON parsing
            3. **Path traversal** — file operations using unsanitized paths from tool input
            4. **Credential exposure** — hardcoded secrets, tokens, or API keys in code or config
            5. **Unsafe file operations** — insecure permissions, symlink attacks, TOCTOU races in hook scripts
            6. **Supply-chain hardening** — beyond what the action-pinning linter already catches (that one fails PRs with `uses: owner/action@master` outright), look for workflows that fetch or interpolate external content: any `run:` step that interpolates attacker-controllable GitHub event inputs (issue/PR title or body, commit messages, head_ref, etc.) without `env:` quoting; any workflow that downloads scripts/binaries from a URL and executes them; any `pull_request_target` trigger that checks out the PR head. The deterministic pinning linter and the marketplace-version-sync linter handle the mechanical cases — your job is the subtler ones.
            7. **Prompt-injection in agent prompts** — SKILL.md files that build prompts for `Agent(...)` or `Skill(...)` invocations by interpolating user-controlled free-text (wizardAnswers.projectDescription, pain points, notes, anything captured from a wizard Q&A) without wrapping it in an explicit `<untrusted-user-input field="...">...</untrusted-user-input>` data fence. The pattern we've adopted (see `onboard/skills/init/references/onboard-context-builder.md` § Untrusted-input sanitiser and `onboard/skills/generate/SKILL.md` § validate) is: length-cap + strip `\r` + wrap in the XML fence + instruct the agent to treat fenced content as data, not instructions. Flag any new SKILL.md that forwards free-text into an agent prompt without this treatment.

            Skip categories irrelevant to this repo: SQL/NoSQL/LDAP injection, XXE, XSS, CSRF, deserialization, authentication, session management.

            Format: list findings as Critical / High / Medium / Low. If clean, confirm the changes pass review.
