<section id="flow" class="widget">
  <div class="widget-head" data-section="flow">
    <div class="widget-icon flow">↳</div>
    <div class="widget-title">{{headingText}}</div>
  </div>
  <div class="widget-body">
    <div class="pipeline">{{steps}}</div>
    {{#if asciiBlock}}<div class="ascii-source">{{asciiBlock}}</div>{{/if}}
  </div>
</section>
